services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "8080:80"
    environment:
      - API_HOST=server
      - API_PORT=3000
    depends_on:
      - server
